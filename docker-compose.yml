services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backup_saas
      POSTGRES_PASSWORD: backup_saas
      POSTGRES_DB: backup_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup_saas -d backup_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    working_dir: /workspace
    command: bun --filter @backup-saas/app dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://backup_saas:backup_saas@postgres:5432/backup_saas
      API_ENABLED: "true"
      WORKER_ENABLED: "true"
      PORT: "3000"
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: runtime
    env_file: .env
    environment:
      PUBLIC_API_BASE_URL: http://localhost:8080
      INTERNAL_API_BASE_URL: http://app:3000
      HOST: 0.0.0.0
      PORT: "4321"
    ports:
      - "4321:4321"
    depends_on:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - web

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: backup_saas
      MYSQL_DATABASE: backup_saas_fixture
      MYSQL_USER: backup_saas
      MYSQL_PASSWORD: backup_saas
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -ubackup_saas -pbackup_saas --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3317:3306"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:
