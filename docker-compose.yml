x-bun-app: &bun-app
  restart: unless-stopped
  init: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: backup_saas
      POSTGRES_PASSWORD: backup_saas
      POSTGRES_DB: backup_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backup_saas -d backup_saas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"

  app:
    <<: *bun-app
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    working_dir: /workspace
    command: bun --filter @backup-saas/app dev
    env_file: .env
    environment:
      DATABASE_URL: postgres://backup_saas:backup_saas@postgres:5432/backup_saas
      API_ENABLED: "true"
      WORKER_ENABLED: "true"
      PORT: "3000"
      OAUTH_REDIRECT_BASE_URL: http://localhost:3000
      WEB_BASE_URL: http://localhost:4321
      OBJECT_STORAGE_LOCAL_DIR: /workspace/.storage/backups
    volumes:
      - .:/workspace
      - app_storage:/workspace/.storage
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    <<: *bun-app
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      target: deps
    working_dir: /workspace
    command: bun --filter @backup-saas/web dev --host 0.0.0.0
    env_file: .env
    environment:
      PUBLIC_API_BASE_URL: http://localhost:3000
      INTERNAL_API_BASE_URL: http://app:3000
      HOST: 0.0.0.0
      PORT: "4321"
      VITE_CACHE_DIR: /tmp/vite-web
    volumes:
      - .:/workspace
    ports:
      - "4321:4321"
    depends_on:
      app:
        condition: service_started

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: backup_saas
      MYSQL_DATABASE: backup_saas_fixture
      MYSQL_USER: backup_saas
      MYSQL_PASSWORD: backup_saas
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -ubackup_saas -pbackup_saas --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    ports:
      - "3317:3306"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:
  app_storage:
